name: AI Agent (Claude)

on:
  issues:
    types: [opened]
    
permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install axios

      - name: Run Claude Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node .github/scripts/agent.js

      - name: Commit changes
        run: |
          git config user.name "ai-agent"
          git config user.email "ai@bot.com"
          git add .
          git commit -m "AI agent update from issue #${{ github.event.issue.number }}" || echo "No changes"
          git push
