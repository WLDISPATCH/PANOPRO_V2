<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- PANO PRO mark: orbit ring, teal swoosh, navy skyline, survey point -->
  <defs>
    <clipPath id="lower-hemisphere">
      <rect x="8" y="62" width="104" height="50"/>
    </clipPath>
  </defs>

  <!-- outer orbit ring (dashed navy) -->
  <circle cx="60" cy="60" r="46" fill="none" stroke="#1d3557" stroke-width="4.5"
          stroke-linecap="round" stroke-dasharray="52 7 34 7 52 7 34 200" transform="rotate(-28 60 60)"/>

  <!-- faint survey grid on the lower hemisphere -->
  <g clip-path="url(#lower-hemisphere)" fill="none" stroke="#8fa5b8" stroke-width="1.6" stroke-dasharray="4 4">
    <ellipse cx="60" cy="60" rx="34" ry="34"/>
    <ellipse cx="60" cy="60" rx="20" ry="33"/>
    <ellipse cx="60" cy="60" rx="33" ry="18"/>
  </g>

  <!-- north pointer -->
  <path d="M 60 6 L 65 16 L 55 16 Z" fill="#1d3557"/>

  <!-- skyline bars -->
  <g>
    <path d="M 40 68 L 40 52 L 47 54 L 47 68 Z" fill="#5a7086"/>
    <path d="M 49 68 L 49 42 L 56 44 L 56 68 Z" fill="#33506b"/>
    <path d="M 58 68 L 58 30 L 66 33 L 66 68 Z" fill="#1d3557"/>
    <path d="M 68 68 L 68 44 L 76 47 L 76 68 Z" fill="#2b4a6f"/>
  </g>

  <!-- teal swoosh (orbit ellipse) -->
  <g fill="none" stroke="#17b0c4" stroke-width="5" stroke-linecap="round">
    <path d="M 6 66 C 18 76, 44 80, 62 79"/>
    <path d="M 62 79 C 88 77, 110 69, 113 58 C 114 52, 106 47, 94 45"/>
  </g>

  <!-- plumb line to survey point -->
  <line x1="60" y1="72" x2="60" y2="92" stroke="#1d3557" stroke-width="2" stroke-dasharray="3 4"/>
  <circle cx="60" cy="98" r="4.5" fill="none" stroke="#17b0c4" stroke-width="3"/>
</svg>
